services:
  frontend:
    image: accvalo/Portofolio_v5
    build:
      context: .
      no_cache: true
      dockerfile: Dockerfile
      args:
        # Build-time args (geçici değerler, runtime'da environment'dan override edilecek)
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    container_name: www.burakcankorpinar.dev
    hostname: www.burakcankorpinar.dev
    env_file:
      - .env
    environment:
      # ZORUNLU - Veritabanı (PostgreSQL)
      # .env dosyasından alınır, eğer yoksa hata verecek
      - DATABASE_URL=${DATABASE_URL}   
    restart: always
    ports:
      - "32008:3000"

    # 🔒 SECURITY: Salt-okunur dosya sistemi — virüs dosya yazamaz
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
      - /app/.next/cache:noexec,nosuid,size=500M

    # 🔒 SECURITY: Yetki kısıtlamaları
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
